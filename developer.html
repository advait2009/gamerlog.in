<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}
header {
  background: #111827;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header h1 {
  color: #22c55e;
}
nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}
.hero {
  text-align: center;
  padding: 50px;
}
.hero h2 {
  font-size: 40px;
}
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}
.card {
  background: #1f2937;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}
.card button {
  background: #22c55e;
  border: none;
  padding: 10px;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}
footer {
  text-align: center;
  padding: 20px;
  background: #111827;
}
</style>
</head>
<body>

<header>
  <h1>Game Store</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Minecraft Item Store</h2>
  <p>Buy OP items for your server</p>
</section>

<section id="shop" class="products">
  <div class="card">
    <h3>Diamond Sword</h3>
    <p>₹199</p>
    <button>Buy</button>
  </div>
  <div class="card">
    <h3>Totem of Undying</h3>
    <p>₹299</p>
    <button>Buy</button>
  </div>
  <div class="card">
    <h3>Full Netherite Kit</h3>
    <p>₹999</p>
    <button>Buy</button>
  </div>
</section>

<section id="contact" class="hero">
  <h2>Contact Us</h2>
  <p>Discord: Not_aadi</p>
</section>

<footer>
  <p>© 2026 Game Store</p>
</footer>

</body>
</html>
