<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rank Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
}

.container {
  padding: 40px;
  text-align: center;
}

.title {
  font-size: 40px;
  color: orange;
}

.subtitle {
  color: #bbb;
  margin-bottom: 30px;
}

.rank-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: #1c1c2b;
  border-radius: 15px;
  padding: 20px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px orange;
}

.rank-img {
  width: 100px;
  height: 100px;
  background: #333;
  border-radius: 10px;
  margin-bottom: 10px;
}

.price {
  display: block;
  margin: 10px 0;
  color: orange;
  font-size: 18px;
}

button {
  background: orange;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  color: black;
  font-weight: bold;
}

button:hover {
  background: gold;
}

/* Sidebar */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  height: 100%;
  width: 200px;
  background: #111;
  padding-top: 20px;
}

.sidebar h3 {
  color: orange;
}

.sidebar a {
  display: block;
  color: white;
  padding: 10px;
  text-decoration: none;
}

.sidebar a:hover {
  background: orange;
  color: black;
}

.main {
  margin-left: 220px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h3>Categories</h3>
  <a href="#">Coins</a>
  <a href="#">Lifesteal</a>
  <a href="#">Classic Ranks</a>
</div>

<div class="main">
<div class="container">

<h1 class="title">🔥 Classic Ranks</h1>
<p class="subtitle">Buy awesome ranks for your server</p>

<div class="rank-grid">

<div class="card">
  <div class="rank-img"></div>
  <h2>SUPREME</h2>
  <p>+3200 Coins</p>
  <span class="price">$22.00</span>
  <button onclick="buyRank('Supreme')">Add to Cart</button>
</div>

<div class="card">
  <div class="rank-img"></div>
  <h2>LEGEND</h2>
  <p>+2000 Coins</p>
  <span class="price">$11.00</span>
  <button onclick="buyRank('Legend')">Add to Cart</button>
</div>

<div class="card">
  <div class="rank-img"></div>
  <h2>MASTERMIND</h2>
  <p>+1000 Coins</p>
  <span class="price">$6.70</span>
  <button onclick="buyRank('Mastermind')">Add to Cart</button>
</div>

<div class="card">
  <div class="rank-img"></div>
  <h2>ALPHA</h2>
  <p>+850 Coins</p>
  <span class="price">$4.40</span>
  <button onclick="buyRank('Alpha')">Add to Cart</button>
</div>

<div class="card">
  <div class="rank-img"></div>
  <h2>CAPTAIN</h2>
  <p>Monthly Rank</p>
  <span class="price">$2.20</span>
  <button onclick="buyRank('Captain')">Subscribe</button>
</div>

<div class="card">
  <div class="rank-img"></div>
  <h2>STAR</h2>
  <p>Monthly Rank</p>
  <span class="price">$1.00</span>
  <button onclick="buyRank('Star')">Subscribe</button>
</div>

</div>
</div>
</div>

<script>
function buyRank(rank) {
  alert("You selected: " + rank);

  // Future upgrade:
  // connect Tebex / Razorpay / PayPal here
}
</script>

</body>
</html>
