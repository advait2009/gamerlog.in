<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamerlog SMP Staff</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top,#0c1b2e,#000);
    color:white;
    text-align:center;
}

header{
    padding:20px;
    background:#0b0f18;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

.title{
    font-size:40px;
    margin-top:40px;
    background: linear-gradient(90deg,#4cc9f0,#9d4edd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.staff-container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:30px;
    padding:60px;
    max-width:1200px;
    margin:auto;
}

.card{
    background:#111827;
    padding:30px;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 20px #4cc9f0;
}

.card img{
    width:80px;
    height:80px;
}

.name{
    font-size:20px;
    margin-top:10px;
}

.rank{
    font-size:14px;
    margin-top:5px;
    color:#00b4ff;
}

.owner{color:#ffb703;}
.dev{color:#4cc9f0;}
.staff{color:#9d4edd;}
.helper{color:#ffd60a;}

</style>
</head>

<body>

<header>
<nav>
<a href="#">HOME</a>
<a href="#">STAFF</a>
<a href="#">CREATORS</a>
<a href="#">PARTNER</a>
<a href="#">UPDATES</a>
<a href="#">SUPPORT</a>
</nav>
</header>

<h1 class="title">THE LEGENDS BEHIND SMP</h1>

<div class="staff-container">

<div class="card">
<img src="https://minotar.net/avatar/KtDev/100">
<div class="name">KtDev</div>
<div class="rank owner">OWNER</div>
</div>

<div class="card">
<img src="https://minotar.net/avatar/Vansh/100">
<div class="name">Vansh</div>
<div class="rank dev">DEVELOPER</div>
</div>

<div class="card">
<img src="https://minotar.net/avatar/Hackerji/100">
<div class="name">Hackerji</div>
<div class="rank dev">DEVELOPER</div>
</div>

<div class="card">
<img src="https://minotar.net/avatar/GODXMARATHA/100">
<div class="name">GODXMARATHA</div>
<div class="rank staff">STAFF</div>
</div>

<div class="card">
<img src="https://minotar.net/avatar/PrimeBhai/100">
<div class="name">PrimeBhai</div>
<div class="rank staff">STAFF</div>
</div>

<div class="card">
<img src="https://minotar.net/avatar/Redrebeller/100">
<div class="name">Redrebeller</div>
<div class="rank helper">TICKET HELPER</div>
</div>

</div>

</body>
</html>
