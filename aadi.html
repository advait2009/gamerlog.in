<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamerlog SMP</title>

<style>
html{scroll-behavior:smooth;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body{
  background:radial-gradient(circle at top,#1b0033,#000);
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 60px;
  background:#000;
}
.logoText{font-size:24px;font-weight:bold;}
nav ul{display:flex;gap:30px;list-style:none;}
nav ul li a{color:#aaa;text-decoration:none;font-weight:600;}
nav ul li a:hover{color:#00eaff;}
.login{
  background:linear-gradient(90deg,#5f6fff,#a259ff);
  padding:8px 20px;
  border-radius:8px;
  font-weight:bold;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
}
.logoBox img{width:420px;animation:float 4s infinite;}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}
.season{margin-top:30px;color:#ffd000;font-size:50px;}
.coming{font-size:70px;color:#6ff9ff;font-weight:bold;margin-top:10px;}

/* SERVER */
.serverBox{display:flex;gap:30px;flex-wrap:wrap;margin-top:50px;}
.box{
  background:#0a0f18;
  padding:35px 45px;
  border-radius:14px;
  border:1px solid #142235;
  position:relative;
}
.copyBtn{
  margin-top:15px;
  padding:10px 22px;
  border:none;
  border-radius:8px;
  background:#00eaff;
  cursor:pointer;
}
.copyMsg{
  opacity:0;
  position:absolute;
  top:5px;
  right:10px;
  transition:.5s;
}
.copyMsg.show{opacity:1;transform:translateY(-15px);}

/* STATUS */
.status{margin-top:30px;}
.online{color:#00ff9d;}
.offline{color:red;}

/* CROSS */
.cross{
  border:2px solid #ffd000;
  padding:12px 30px;
  border-radius:25px;
  margin-top:30px;
}

/* DISCORD BTN */
.discord{
  margin-top:35px;
  background:#5865F2;
  padding:14px 32px;
  border-radius:10px;
  color:white;
  text-decoration:none;
}

/* DISCORD PRO */
.discordSection{padding:120px;text-align:center;background:#0b1020;}
.discordTitle{font-size:50px;color:#5865F2;text-shadow:0 0 20px #5865F2;}
.discordBox{
  max-width:600px;margin:auto;background:#111;padding:40px;
  border-radius:15px;box-shadow:0 0 20px rgba(88,101,242,0.5);
  transition:.4s;
}
.discordBox:hover{transform:translateY(-10px);}
.discordBtn{
  padding:14px 30px;background:#5865F2;color:white;
  border-radius:10px;text-decoration:none;
}

/* POPUP */
#dcPopup{
position:fixed;
bottom:20px;
right:20px;
background:#111;
padding:20px;
border-radius:15px;
box-shadow:0 0 25px #5865F2;
display:none;
z-index:9999;
}

/* PARTICLES */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- NAV -->
<nav>
<div class="logoText">GAMERLOG SMP</div>
<ul>
<li><a href="#">HOME</a></li>
<li><a href="#discord">DISCORD</a></li>
</ul>
</nav>

<!-- HERO -->
<section class="hero">
<h1>COMING SOON</h1>
<a class="discord" href="https://discord.gg/Zc6PkAXTgF" onclick="playSound()">Join Discord</a>
</section>

<!-- DISCORD SECTION -->
<section id="discord" class="discordSection">
<h1 class="discordTitle">JOIN DISCORD</h1>
<div class="discordBox">
<a href="https://discord.gg/Zc6PkAXTgF" onclick="playSound()" class="discordBtn">JOIN NOW</a>
</div>
</section>

<!-- POPUP -->
<div id="dcPopup">
<p>Join our Discord!</p>
<a href="https://discord.gg/Zc6PkAXTgF" onclick="playSound()">JOIN</a>
</div>

<script>
function playSound(){
 new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play();
}

/* popup */
setTimeout(()=>{
 document.getElementById("dcPopup").style.display="block";
},5000);

/* particles */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<50;i++){
 p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function anim(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 p.forEach(a=>{
  a.y+=0.5;
  if(a.y>canvas.height)a.y=0;
  ctx.fillStyle="#5865F2";
  ctx.fillRect(a.x,a.y,2,2);
 });
 requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
