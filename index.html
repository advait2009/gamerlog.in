```html id="partner-emoji"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamerlog SMP | Partner</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  background:#1a001a;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PARTICLES */
.particles{
  position:absolute;
  width:100%;
  height:100%;
  z-index:0;
  overflow:hidden;
}

.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:linear-gradient(45deg,#ff003c,#7a00ff);
  border-radius:50%;
  animation:particleMove 12s linear infinite;
  opacity:0.7;
}

@keyframes particleMove{
  0%{transform:translateY(0) translateX(0) scale(0.5);}
  50%{transform:translateY(-600px) translateX(100px) scale(1);}
  100%{transform:translateY(0) translateX(200px) scale(0.5);}
}

/* HERO / PARTNER CARD */
.hero{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.partner-box{
  position:relative;
  z-index:1;
  width:220px;
  height:220px;
  border-radius:25px;
  background:rgba(30,0,30,0.95);
  backdrop-filter:blur(6px);
  box-shadow:0 0 40px rgba(186,0,255,0.7);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition: all 0.6s ease-in-out;
  overflow:hidden;
  cursor:pointer;
  transform-style: preserve-3d;
}

/* Glowing red-purple border */
.partner-box::before{
  content:"";
  position:absolute;
  top:-4px;
  left:-4px;
  right:-4px;
  bottom:-4px;
  border-radius:25px;
  background:linear-gradient(90deg,#ff003c,#7a00ff);
  background-size:200%;
  z-index:-1;
  animation:borderGlow 5s linear infinite;
}

@keyframes borderGlow{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* Floating animation */
.partner-box{
  animation:floatSmooth 4s ease-in-out infinite;
}

@keyframes floatSmooth{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* Logo */
.logo{
  width:120px;
  border-radius:20px;
  transition: transform 0.5s ease;
  position:relative;
}

/* Emoji sparkle on logo */
.logo::after{
  content:"✨";
  position:absolute;
  top:-10px;
  right:-10px;
  font-size:18px;
  animation:emojiSpark 2s ease-in-out infinite;
}

@keyframes emojiSpark{
  0%,100%{transform:translateY(0) rotate(0deg); opacity:0.8;}
  50%{transform:translateY(-6px) rotate(15deg); opacity:1;}
}

/* Title & Desc hidden by default */
.title, .desc, .btn{
  opacity:0;
  transform:translateY(30px);
  transition: all 0.5s ease;
  text-align:center;
}

/* HOVER EFFECT (simple open) */
.partner-box:hover{
  width:420px;
  height:auto;
  padding:40px;
}

.partner-box:hover .logo{
  transform:scale(1.05);
}

.partner-box:hover .title,
.partner-box:hover .desc,
.partner-box:hover .btn{
  opacity:1;
  transform:translateY(0);
}

/* Text styles */
.title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
  background:linear-gradient(90deg,#ff003c,#7a00ff);
  -webkit-background-clip:text;
  color:transparent;
}

.desc{
  font-size:15px;
  color:#e0b3ff;
  margin-bottom:20px;
  line-height:1.5;
}

/* Add emojis in description */
.desc::before{
  content:"🔥 ⚔️ 🛡️ ";
}
.desc::after{
  content:" 💎 ✨";
}

.btn{
  display:inline-block;
  padding:12px 28px;
  font-size:15px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,#ff003c,#7a00ff);
  transition: all 0.3s ease;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #7a00ff;
}
</style>
</head>
<body>

<div class="particles"></div>

<div class="hero">
  <div class="partner-box">
    <img class="logo" src="https://mc-heads.net/avatar/Steve">
    <div class="title">Gamerlog SMP Partner ✨</div>
    <div class="desc">Join the adventure, battle, and rise as legend!</div>
    <a class="btn" href="#">Join Now ⚡</a>
  </div>
</div>

<script>
// Generate simple particles
const particleContainer = document.querySelector('.particles');
for(let i=0;i<40;i++){
  let p = document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*window.innerWidth+'px';
  p.style.top=Math.random()*window.innerHeight+'px';
  p.style.animationDuration=(8+Math.random()*8)+'s';
  p.style.width=(3+Math.random()*4)+'px';
  p.style.height=p.style.width;
  particleContainer.appendChild(p);
}
</script>

</body>
</html>
```
