<mtml>
<head>
  <title>Partners | Gamerlog SMP</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #8B00FF, #FF0055);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }

    h1 {
      margin-top: 30px;
      font-size: 3em;
      text-shadow: 2px 2px #00000088;
    }

    .partners-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      padding: 40px;
      width: 90%;
      max-width: 1200px;
    }

    .partner-card {
      background: #2a002a88;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: transform 0.4s ease, background 0.4s ease;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .partner-card:hover {
      transform: translateY(-10px) scale(1.05);
      background: #FF005588;
    }

    .partner-card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 2px solid white;
    }

    .partner-card h3 {
      margin: 10px 0 5px;
    }

    .partner-card p {
      margin: 0;
      font-size: 0.9em;
      color: #f0f0f0;
    }

    footer {
      margin: 40px 0 20px;
      font-size: 0.9em;
      opacity: 0.8;
    }

  </style>
</head>

<body>
  <h1>🤝 Our Partners</h1>

  <div class="partners-container">
    <div class="partner-card">
      <img src="https://i.imgur.com/partner1.png" alt="Partner 1">
      <h3>PartnerOne 💻</h3>
      <p>Official Developer</p>
    </div>

    <div class="partner-card">
      <img src="https://i.imgur.com/partner2.png" alt="Partner 2">
      <h3>RedRebeller 🛠️</h3>
      <p>Staff & Support</p>
    </div>

    <div class="partner-card">
      <img src="https://i.imgur.com/partner3.png" alt="Partner 3">
      <h3>MediaHub 📸</h3>
      <p>Media & Promotion</p>
    </div>

    <div class="partner-card">
      <img src="https://i.imgur.com/partner4.png" alt="Partner 4">
      <h3>PrimeBhai 🛡️</h3>
      <p>Support Team</p>
    </div>
  </div>

  <footer>© 2026 Gamerlog SMP | All Rights Reserved</footer>
</body>
</mtml>
