```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamerlog SMP | Partner</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  overflow:hidden;
  background:#050505;
}

/* PARTICLES */
.particles, .smoke{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:linear-gradient(90deg,#ff003c,#7a00ff);
  border-radius:50%;
  animation:particleMove 10s linear infinite;
}

@keyframes particleMove{
  0%{transform:translateY(0) translateX(0) scale(0.5);}
  50%{transform:translateY(-800px) translateX(200px) scale(1);}
  100%{transform:translateY(0) translateX(400px) scale(0.5);}
}

/* Smoke */
.smoke div{
  position:absolute;
  width:40px;
  height:40px;
  background:rgba(255,255,255,0.05);
  border-radius:50%;
  animation:smokeMove 20s linear infinite;
}

@keyframes smokeMove{
  0%{transform:translateY(600px) translateX(0) scale(0.5);}
  100%{transform:translateY(-400px) translateX(200px) scale(1);}
}

/* HERO / PARTNER CARD */
.hero{
  position:relative;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.partner-box{
  position:relative;
  z-index:2;
  width:470px;
  padding:50px;
  border-radius:25px;
  background:rgba(20,20,20,0.95);
  backdrop-filter:blur(6px);
  box-shadow:0 0 60px rgba(122,0,255,0.7);
  animation:floatJump 5s ease-in-out infinite;
  transform-origin:center;
}

/* GLOW BORDER */
.partner-box::before{
  content:"";
  position:absolute;
  top:-4px;
  left:-4px;
  right:-4px;
  bottom:-4px;
  border-radius:25px;
  background:linear-gradient(90deg,#ff003c,#7a00ff,#ff003c);
  background-size:300%;
  z-index:-1;
  animation:borderGlow 6s linear infinite;
}

@keyframes borderGlow{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* FLOAT + JUMP + ROTATE ANIMATION */
@keyframes floatJump{
  0%{transform:translateY(0) rotate(0deg);}
  20%{transform:translateY(-15px) rotate(5deg);}
  40%{transform:translateY(0) rotate(-5deg);}
  60%{transform:translateY(-10px) rotate(3deg);}
  80%{transform:translateY(0) rotate(-3deg);}
  100%{transform:translateY(0) rotate(0deg);}
}

/* Glowing pulse text animation */
.desc span{
  display:inline-block;
  animation:glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse{
  0%,100%{color:#bbb;text-shadow:0 0 3px #ff003c,0 0 5px #7a00ff;}
  50%{color:#fff;text-shadow:0 0 10px #ff003c,0 0 20px #7a00ff;}
}

.logo{
  width:140px;
  border-radius:20px;
  margin-bottom:20px;
}

.title{
  font-size:36px;
  font-weight:bold;
  margin-bottom:15px;
  animation:titleShake 4s ease-in-out infinite;
}

@keyframes titleShake{
  0%,100%{transform:rotate(0deg);}
  25%{transform:rotate(2deg);}
  50%{transform:rotate(-2deg);}
  75%{transform:rotate(1deg);}
}

.desc{
  font-size:16px;
  margin-bottom:25px;
  line-height:1.6;
}

.btn{
  display:inline-block;
  padding:14px 32px;
  border-radius:12px;
  text-decoration:none;
  font-size:16px;
  color:white;
  background:linear-gradient(90deg,#ff003c,#7a00ff);
  transition:0.3s;
  animation:btnPulse 2s ease-in-out infinite;
}

.btn:hover{
  transform:scale(1.15);
  box-shadow:0 0 25px #7a00ff;
}

@keyframes btnPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}
</style>
</head>
<body>

<div class="particles"></div>
<div class="smoke"></div>

<div class="hero">
  <div class="partner-box">
    <img class="logo" src="https://mc-heads.net/avatar/Steve">
    <div class="title">Official Partner Server</div>
    <div class="desc">
      <span>⚡ Unleash chaos, conquer worlds &amp; dominate every battle! ⚡</span>
    </div>
    <a class="btn" href="#">Join the Adventure</a>
  </div>
</div>

<script>
// Generate particles
const particleContainer = document.querySelector('.particles');
for(let i=0;i<50;i++){
  let p = document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*window.innerWidth+'px';
  p.style.top=Math.random()*window.innerHeight+'px';
  p.style.animationDuration=(5+Math.random()*10)+'s';
  p.style.width=(3+Math.random()*5)+'px';
  p.style.height=p.style.width;
  particleContainer.appendChild(p);
}

// Generate smoke
const smokeContainer = document.querySelector('.smoke');
for(let i=0;i<20;i++){
  let s = document.createElement('div');
  s.style.left=Math.random()*window.innerWidth+'px';
  s.style.bottom='-50px';
  s.style.width=(20+Math.random()*40)+'px';
  s.style.height=s.style.width;
  s.style.animationDuration=(15+Math.random()*10)+'s';
  smokeContainer.appendChild(s);
}
</script>

</body>
</html>
```
