```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamerlog SMP | Partner</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;

/* DRAGON BACKGROUND */
background:url("https://i.imgur.com/6IUbEMB.png") center/cover no-repeat;
}

/* dark overlay */

body::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:0;
}

/* floating partner card */

.partner-box{
position:relative;
z-index:1;
width:420px;
padding:50px;
border-radius:25px;
background:rgba(20,20,20,0.9);
text-align:center;
backdrop-filter:blur(6px);
box-shadow:0 0 40px rgba(122,0,255,0.5);
animation:float 4s ease-in-out infinite;
}

/* glowing animated border */

.partner-box::before{
content:"";
position:absolute;
top:-3px;
left:-3px;
right:-3px;
bottom:-3px;
border-radius:25px;
background:linear-gradient(90deg,#ff003c,#7a00ff,#ff003c);
background-size:300%;
z-index:-1;
animation:borderMove 6s linear infinite;
}

@keyframes borderMove{
0%{background-position:0%}
100%{background-position:300%}
}

/* floating animation */

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.logo{
width:120px;
border-radius:20px;
margin-bottom:20px;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
color:#bbb;
font-size:15px;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:12px 28px;
border-radius:10px;
text-decoration:none;
font-size:16px;
color:white;
background:linear-gradient(90deg,#ff003c,#7a00ff);
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #7a00ff;
}

</style>
</head>

<body>

<div class="partner-box">

<img class="logo" src="https://mc-heads.net/avatar/Steve">

<div class="title">Official Server Partner</div>

<div class="desc">
This server is the official partner of Gamerlog SMP.  
Join the adventure and experience epic Minecraft gameplay.
</div>

<a class="btn" href="#">Visit Partner</a>

</div>

</body>
</html>
```
