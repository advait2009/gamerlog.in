<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Creators</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#3a0f0f,#070707);
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

.container{
    text-align:center;
}

.title{
    font-size:40px;
    letter-spacing:4px;
    color:#ff4d4d;
    text-shadow:0 0 15px #ff4d4d;
    margin-bottom:30px;
}

.card{
    width:350px;
    padding:35px;
    border-radius:20px;
    background:#141414;
    box-shadow:0 0 25px rgba(255,60,60,0.6);
}

.avatar{
    width:80px;
    height:80px;
    background:#ff6a6a;
    margin:auto;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
}

.name{
    margin-top:15px;
    font-size:28px;
    font-weight:bold;
}

.tag{
    margin:15px auto;
    padding:6px 16px;
    border:1px solid #ff5a5a;
    border-radius:20px;
    display:inline-block;
    font-size:13px;
    color:#ff7b7b;
}

.desc{
    margin-top:10px;
    font-size:14px;
    color:#ddd;
}

.subscribe{
    margin-top:20px;
}

.subscribe a{
    text-decoration:none;
    background:#ff3c3c;
    padding:10px 25px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    box-shadow:0 0 10px #ff3c3c;
}

.subscribe a:hover{
    background:#ff5c5c;
}

</style>
</head>

<body>

<div class="container">

<div class="title">OFFICIAL CREATORS</div>

<div class="card">

<div class="avatar">SH</div>

<div class="name">Shxdow</div>

<div class="tag">📹 CONTENT CREATOR</div>

<div class="desc">
Catch the most epic survival adventures, server trolling,
and intense gameplay on my channel!
</div>

<div class="subscribe">
<a href="#">▶ SUBSCRIBE</a>
</div>

</div>

</div>

</body>
</html>
