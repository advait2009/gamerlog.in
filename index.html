<mtml>
<head>
  <title>Partners | Gamerlog SMP</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #0a0a0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 40px;
      color: #FF0055;
      text-shadow: 2px 2px #8B00FF88;
    }

    .partner-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      background: #1a1a2e;
      border-radius: 15px;
      padding: 25px;
      width: 90%;
      max-width: 900px;
      margin-bottom: 30px;
      box-shadow: 0 5px 20px rgba(255,0,85,0.3);
      transition: transform 0.3s ease;
    }

    .partner-card:hover {
      transform: translateY(-5px);
    }

    .partner-card img {
      width: 120px;
      height: 120px;
      border-radius: 15px;
      margin-right: 30px;
      border: 2px solid #FF0055;
    }

    .partner-info h2 {
      margin: 0;
      color: #FF66AA;
      font-size: 1.8em;
    }

    .partner-info p {
      margin: 8px 0 15px;
      font-size: 1em;
      color: #cccccc;
    }

    .partner-info button {
      padding: 10px 25px;
      font-size: 1em;
      color: white;
      background: #8B00FF55;
      border: none;
      border-radius: 10px;
      cursor: not-allowed;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <h1>🤝 Our Partners</h1>

  <!-- Coming Soon Partner -->
  <div class="partner-card">
    <img src="/mnt/data/9be248e2-21b5-43d3-b6fe-cd1df5447053.png" alt="Partner Logo">
    <div class="partner-info">
      <h2>Partner Coming Soon ⚡</h2>
      <p>Stay tuned! We are adding more official partners to Gamerlog SMP. Big things are coming!</p>
      <button disabled>Coming Soon</button>
    </div>
  </div>

</body>
</mtml>
