```html id="partner-ultra"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamerlog SMP | Interactive Partner</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  background:#050105;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PARTICLES */
.particles{
  position:absolute;
  width:100%;
  height:100%;
  z-index:0;
  overflow:hidden;
}

.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:linear-gradient(45deg,#b300ff,#ff00c8,#7a00ff);
  border-radius:50%;
  animation:particleMove 12s linear infinite;
  opacity:0.7;
}

@keyframes particleMove{
  0%{transform:translateY(0) translateX(0) scale(0.5);}
  50%{transform:translateY(-800px) translateX(200px) scale(1);}
  100%{transform:translateY(0) translateX(400px) scale(0.5);}
}

/* HERO / PARTNER CARD */
.hero{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.partner-box{
  position:relative;
  z-index:1;
  width:220px;
  height:220px;
  border-radius:25px;
  background:rgba(25,0,40,0.95);
  backdrop-filter:blur(8px);
  box-shadow:0 0 60px rgba(186,0,255,0.7);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition: all 0.7s cubic-bezier(0.25,1,0.5,1);
  overflow:hidden;
  cursor:pointer;
  transform-style: preserve-3d;
}

/* Glowing RGB border */
.partner-box::before{
  content:"";
  position:absolute;
  top:-5px;
  left:-5px;
  right:-5px;
  bottom:-5px;
  border-radius:25px;
  background:linear-gradient(90deg,#b300ff,#ff00c8,#7a00ff);
  background-size:300%;
  z-index:-1;
  animation:borderGlow 5s linear infinite;
}

@keyframes borderGlow{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* Floating animation */
.partner-box{
  animation:floatSmooth 6s ease-in-out infinite;
}

@keyframes floatSmooth{
  0%{transform:translateY(0);}
  25%{transform:translateY(-8px);}
  50%{transform:translateY(0);}
  75%{transform:translateY(-5px);}
  100%{transform:translateY(0);}
}

/* Logo */
.logo{
  width:130px;
  border-radius:20px;
  transition: transform 0.5s ease;
}

/* Title & Desc hidden by default */
.title, .desc, .btn{
  opacity:0;
  transform:translateY(30px);
  transition: all 0.6s ease;
  text-align:center;
}

/* HOVER EFFECT */
.partner-box:hover{
  width:450px;
  height:auto;
  padding:45px;
}

.partner-box:hover .logo{
  transform:scale(1.1) rotate(5deg);
}

.partner-box:hover .title,
.partner-box:hover .desc,
.partner-box:hover .btn{
  opacity:1;
  transform:translateY(0);
}

/* Text styles */
.title{
  font-size:32px;
  font-weight:bold;
  margin-bottom:12px;
  background:linear-gradient(90deg,#b300ff,#ff00c8,#7a00ff);
  -webkit-background-clip:text;
  color:transparent;
}

.desc{
  font-size:16px;
  color:#e0c0ff;
  margin-bottom:20px;
  line-height:1.6;
}

.btn{
  display:inline-block;
  padding:14px 32px;
  font-size:16px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,#b300ff,#ff00c8,#7a00ff);
  transition: all 0.3s ease;
}

.btn:hover{
  transform:scale(1.12);
  box-shadow:0 0 25px #ff00c8;
}
</style>
</head>
<body>

<div class="particles"></div>

<div class="hero">
  <div class="partner-box">
    <img class="logo" src="https://mc-heads.net/avatar/Steve">
    <div class="title">Gamerlog SMP Partner</div>
    <div class="desc">⚡ Enter the arena, conquer worlds, and become legend! ⚡</div>
    <a class="btn" href="#">Join Now</a>
  </div>
</div>

<script>
// Generate smooth particles
const particleContainer = document.querySelector('.particles');
for(let i=0;i<60;i++){
  let p = document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*window.innerWidth+'px';
  p.style.top=Math.random()*window.innerHeight+'px';
  p.style.animationDuration=(8+Math.random()*10)+'s';
  p.style.width=(3+Math.random()*5)+'px';
  p.style.height=p.style.width;
  particleContainer.appendChild(p);
}
</script>

</body>
</html>
