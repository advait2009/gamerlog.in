```html id="partner-hover"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamerlog SMP | Interactive Partner</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  background:#050505;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PARTICLES */
.particles{
  position:absolute;
  width:100%;
  height:100%;
  z-index:0;
  overflow:hidden;
}

.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:linear-gradient(90deg,#ff003c,#7a00ff);
  border-radius:50%;
  animation:particleMove 10s linear infinite;
}

@keyframes particleMove{
  0%{transform:translateY(0) translateX(0) scale(0.5);}
  50%{transform:translateY(-800px) translateX(200px) scale(1);}
  100%{transform:translateY(0) translateX(400px) scale(0.5);}
}

/* HERO / PARTNER CARD */
.hero{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.partner-box{
  position:relative;
  z-index:1;
  width:220px;
  height:220px;
  border-radius:25px;
  background:rgba(20,20,20,0.9);
  backdrop-filter:blur(6px);
  box-shadow:0 0 50px rgba(122,0,255,0.7);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition: all 0.8s ease-in-out;
  overflow:hidden;
}

/* Glow border */
.partner-box::before{
  content:"";
  position:absolute;
  top:-4px;
  left:-4px;
  right:-4px;
  bottom:-4px;
  border-radius:25px;
  background:linear-gradient(90deg,#ff003c,#7a00ff,#ff003c);
  background-size:300%;
  z-index:-1;
  animation:borderGlow 6s linear infinite;
}

@keyframes borderGlow{
  0%{background-position:0%}
  100%{background-position:300%}
}

.logo{
  width:120px;
  border-radius:20px;
  transition: transform 0.5s ease;
}

.title, .desc, .btn{
  opacity:0;
  transform:translateY(30px);
  transition: all 0.5s ease;
  text-align:center;
}

/* HOVER EFFECT */
.partner-box:hover{
  width:450px;
  height:auto;
  padding:40px;
}

.partner-box:hover .logo{
  transform:scale(1.1) rotate(5deg);
}

.partner-box:hover .title,
.partner-box:hover .desc,
.partner-box:hover .btn{
  opacity:1;
  transform:translateY(0);
}

.title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
}

.desc{
  font-size:15px;
  color:#bbb;
  margin-bottom:20px;
  line-height:1.5;
}

.btn{
  display:inline-block;
  padding:12px 28px;
  font-size:15px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,#ff003c,#7a00ff);
  transition: 0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #7a00ff;
}

/* Floating animation */
.partner-box{
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0);}
}
</style>
</head>
<body>

<div class="particles"></div>

<div class="hero">
  <div class="partner-box">
    <img class="logo" src="https://mc-heads.net/avatar/Steve">
    <div class="title">Gamerlog SMP Partner</div>
    <div class="desc">
      ⚡ Unleash chaos, conquer worlds & dominate every battle! ⚡
    </div>
    <a class="btn" href="#">Join Now</a>
  </div>
</div>

<script>
// Generate particles
const particleContainer = document.querySelector('.particles');
for(let i=0;i<50;i++){
  let p = document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*window.innerWidth+'px';
  p.style.top=Math.random()*window.innerHeight+'px';
  p.style.animationDuration=(5+Math.random()*10)+'s';
  p.style.width=(3+Math.random()*5)+'px';
  p.style.height=p.style.width;
  particleContainer.appendChild(p);
}
</script>

</body>
</html>
