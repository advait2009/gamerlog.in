<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamerlog SMP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background: radial-gradient(circle at center,#0a0015,#000);
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#000;
border-bottom:1px solid #111;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav ul li{
color:#ccc;
cursor:pointer;
font-weight:bold;
}

nav ul li:hover{
color:#00eaff;
}

.login{
background:linear-gradient(90deg,#5b6cff,#9b59ff);
padding:8px 18px;
border-radius:8px;
}

/* HERO */

.hero{
text-align:center;
margin-top:60px;
position:relative;
}

/* LOGO BOX */

.logoBox{
width:340px;
height:340px;
margin:auto;
background:#000;
border-radius:6px;
box-shadow:0 0 40px #a000ff;
display:flex;
align-items:center;
justify-content:center;
}

.logoBox img{
width:90%;
}

/* SEASON */

.season{
margin-top:40px;
font-size:34px;
color:#ffd900;
letter-spacing:5px;
font-weight:bold;
}

/* COMING SOON */

.coming{
font-size:48px;
color:#7ef9ff;
margin-top:15px;
font-weight:bold;
}

/* SERVER BOX */

.serverBox{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.box{
background:#06141a;
padding:18px 30px;
border-radius:10px;
border:1px solid #0f2a35;
}

.copy{
margin-left:10px;
cursor:pointer;
}

/* CROSS */

.cross{
margin-top:20px;
border:2px solid #ffc400;
display:inline-block;
padding:10px 25px;
border-radius:20px;
color:#ffc400;
font-weight:bold;
}

/* PLAYER SKINS */

.skin{
position:absolute;
top:120px;
width:170px;
}

.left{
left:80px;
}

.right{
right:80px;
}

</style>
</head>

<body>

<nav>

<div style="font-weight:bold">GAMERLOG SMP</div>

<ul>
<li style="color:#00eaff">HOME</li>
<li>STAFF</li>
<li>CREATORS</li>
<li>PARTNER</li>
<li>UPDATES</li>
<li>SUPPORT</li>
</ul>

<div class="login">LOGIN</div>

</nav>

<!-- PLAYER SKINS -->

<img class="skin left" src="https://mc-heads.net/body/Notch">
<img class="skin right" src="https://mc-heads.net/body/Technoblade">

<div class="hero">

<div class="logoBox">
<img src="gamerlog-logo.png">
</div>

<div class="season">SEASON 3</div>

<div class="coming">COMING SOON</div>

<div class="serverBox">

<div class="box">
JAVA EDITION<br>
<b id="ip">play.gamerlog.fun</b>
<span class="copy" onclick="copyIP()">📋</span>
</div>

<div class="box">
BEDROCK PORT<br>
<b>25575</b>
</div>

</div>

<div class="cross">
⚡ CROSS CONNECTION | JAVA + PE ⚡
</div>

</div>

<script>

function copyIP(){
navigator.clipboard.writeText("play.gamerlog.fun");
alert("Server IP Copied!");
}

</script>

</body>
</html>
