<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assassin SMP</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at center,#140021,#000000);
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#000;
border-bottom:1px solid #111;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav ul li{
color:#ccc;
cursor:pointer;
font-weight:bold;
}

nav ul li:hover{
color:#00eaff;
}

.login{
background:linear-gradient(90deg,#5b6cff,#9b59ff);
padding:8px 18px;
border-radius:8px;
color:white;
font-weight:bold;
}

/* CENTER SECTION */

.hero{
text-align:center;
margin-top:60px;
}

.logoBox{
width:320px;
height:320px;
margin:auto;
background:#000;
border-radius:6px;
box-shadow:0 0 30px #a000ff;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
font-weight:bold;
flex-direction:column;
}

.logoBox span{
color:#c77dff;
}

/* SEASON TEXT */

.season{
margin-top:40px;
font-size:34px;
color:#ffd900;
letter-spacing:5px;
font-weight:bold;
}

.timer{
font-size:60px;
color:#7ef9ff;
margin-top:10px;
font-weight:bold;
}

/* SERVER BOX */

.serverBox{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.box{
background:#06141a;
padding:18px 30px;
border-radius:10px;
border:1px solid #0f2a35;
}

.copy{
margin-left:10px;
cursor:pointer;
}

/* CROSS */

.cross{
margin-top:20px;
border:2px solid #ffc400;
display:inline-block;
padding:10px 25px;
border-radius:20px;
color:#ffc400;
font-weight:bold;
}

/* PLAYER SKINS */

.skin{
position:absolute;
top:180px;
width:160px;
}

.left{
left:80px;
}

.right{
right:80px;
}

</style>
</head>

<body>

<nav>

<div style="font-weight:bold">KTGAMERS</div>

<ul>
<li style="color:#00eaff">HOME</li>
<li>STAFF</li>
<li>CREATORS</li>
<li>PARTNER</li>
<li>UPDATES</li>
<li>SUPPORT</li>
</ul>

<div class="login">LOGIN</div>

</nav>

<img class="skin left" src="https://mc-heads.net/body/Notch">
<img class="skin right" src="https://mc-heads.net/body/Technoblade">

<div class="hero">

<div class="logoBox">
ASSASSIN
<span>SMP</span>
</div>

<div class="season">SEASON 3</div>

<div class="timer" id="timer">30:00:00</div>

<div class="serverBox">

<div class="box">
JAVA EDITION<br>
<b id="ip">play.ktsmp.in</b>
<span class="copy" onclick="copyIP()">📋</span>
</div>

<div class="box">
BEDROCK PORT<br>
<b>19132</b>
</div>

</div>

<div class="cross">
⚡ CROSS CONNECTION | JAVA + PE ⚡
</div>

</div>

<script>

/* COPY IP */

function copyIP(){
navigator.clipboard.writeText("play.ktsmp.in");
alert("IP Copied!");
}

/* COUNTDOWN */

let time = 104000;

function updateTimer(){
let h = Math.floor(time/3600);
let m = Math.floor((time%3600)/60);
let s = time%60;

document.getElementById("timer").innerText =
`${h}:${m}:${s}`;

time--;
}

setInterval(updateTimer,1000);

</script>

</body>
</html>
