<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamerlog SMP</title>

<style>
/* ===== GENERAL STYLES ===== */
html{scroll-behavior:smooth;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body{
  background:radial-gradient(circle at top,#1b0033,#000);
  color:white;
}

/* ===== NAVBAR ===== */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 80px;
  background:#000;
  position: sticky;
  top:0;
  z-index:1000;
}
.logoText{font-size:28px;font-weight:bold;}
nav ul{
  display:flex;
  gap:40px;
  list-style:none;
}
nav ul li a{
  color:#aaa;
  text-decoration:none;
  font-weight:600;
  font-size:18px;
}
nav ul li a:hover{color:#00eaff;}
.login{
  background:linear-gradient(90deg,#5f6fff,#a259ff);
  padding:10px 25px;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
}

/* ===== HERO ===== */
.hero{
  min-height:110vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:60px;
}
.logoBox img{
  width:480px;
  animation:float 4s infinite ease-in-out;
}
.season{margin-top:40px;color:#ffd000;font-size:60px;letter-spacing:6px;}
.coming{font-size:80px;color:#6ff9ff;font-weight:bold;margin-top:15px;}

/* ===== SERVER BOX ===== */
.serverBox{
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  margin-top:60px;
}
.box{
  background:#0a0f18;
  padding:45px 55px;
  border-radius:16px;
  border:1px solid #142235;
  font-size:24px;
  position:relative;
}
.box b{font-size:32px;}
.copyBtn{
  margin-top:20px;
  padding:12px 26px;
  border:none;
  border-radius:10px;
  background:#00eaff;
  color:black;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
}

/* ===== TOAST ===== */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(50px);
  background: #00eaff;
  color: black;
  font-weight: bold;
  padding: 14px 28px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.5s ease, opacity 0.5s ease;
  z-index: 9999;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== SERVER STATUS ===== */
.status{margin-top:40px;font-size:24px;}
.online{color:#00ff9d;font-weight:bold;}
.offline{color:red;font-weight:bold;}

/* ===== CROSSPLAY ===== */
.cross{
  border:2px solid #ffd000;
  padding:15px 40px;
  border-radius:30px;
  margin-top:40px;
  font-weight:bold;
  font-size:22px;
}

/* ===== DISCORD BUTTON ===== */
.discord{
  margin-top:45px;
  display:inline-block;
  background:#5865F2;
  padding:16px 36px;
  border-radius:12px;
  font-weight:bold;
  text-decoration:none;
  color:white;
  font-size:20px;
}

/* ===== STAFF ===== */
.staffSection{
  padding:150px 40px;
  background:#000;
  text-align:center;
}
.staffTitle{
  font-size:60px;
  color:#6dd5ff;
  margin-bottom:80px;
}
.staff{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
}
.card{
  background:#111;
  padding:25px;
  border-radius:18px;
  width:250px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-12px);
  box-shadow:0 0 25px #00eaff;
}
.card img{
  width:140px;
  border-radius:12px;
}
.name{font-size:22px;margin-top:12px;}
.owner{color:gold;}
.head{color:#ff5c5c;}
.dev{color:#4cc9f0;}
.media{color:#ff9f43;}

/* ===== CREATORS ===== */
.creatorSection{
  padding:150px 40px;
  background:radial-gradient(circle,#3a0f0f,#070707);
  text-align:center;
}
.creatorTitle{
  font-size:50px;
  letter-spacing:5px;
  color:#ff4d4d;
  text-shadow:0 0 25px #ff4d4d;
  margin-bottom:70px;
}
.creatorContainer{
  display:flex;
  justify-content:center;
  gap:70px;
  flex-wrap:wrap;
}
.creatorCard{
  width:380px;
  padding:40px;
  border-radius:22px;
  background:#141414;
  box-shadow:0 0 35px rgba(255,60,60,0.6);
  animation:floatCard 4s ease-in-out infinite;
  transition:0.4s;
}
.creatorCard:hover{
  transform:translateY(-22px) scale(1.07);
  box-shadow:0 0 45px #ff0000;
}
.avatar{
  width:90px;
  height:90px;
  font-size:32px;
}

/* ===== PARTNERS ===== */
.partnerSection{
  padding:150px 40px;
  text-align:center;
  background:#0a0a0f;
}
.partnerSection h1{
  font-size:4em;
  margin-bottom:50px;
}
.partner-card{
  display:flex;
  flex-direction:row;
  align-items:center;
  background:#1a1a2e;
  border-radius:20px;
  padding:40px;
  width:97%;
  max-width:1050px;
  margin:0 auto 35px auto;
}
.mystery-icon{
  width:180px;
  height:180px;
  font-size:6em;
  margin-right:50px;
}

/* ===== DISCORD COMMUNITY WITH BOAT ===== */
.discordCommunity {
  padding:180px 40px 120px;
}
.discordContainer {
  gap:60px;
}
.discordLogo img{
  width:180px;
}

/* ===== SCROLL ANIMATION ===== */
.scroll-element {
  opacity: 0;
  transform: translateY(50px);
  transition: all 0.8s ease-out;
}
.scroll-element.visible {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav>
<div class="logoText">GAMERLOG SMP</div>
<ul>
<li><a href="#">HOME</a></li>
<li><a href="#staff">STAFF</a></li>
<li><a href="#creators">CREATORS</a></li>
<li><a href="#partners">PARTNERS</a></li>
<li><a href="#discordCommunity">DISCORD</a></li>
</ul>
<div class="login">LOGIN</div>
</nav>

<!-- ===== HERO ===== -->
<section class="hero scroll-element">
<div class="logoBox">
<img src="gamerlog-logo.png">
</div>
<div class="season">SEASON 3</div>
<div class="coming">COMING SOON</div>

<div class="serverBox">
<div class="box">
JAVA IP<br>
<b>play.gamerlog.fun</b><br>
<button class="copyBtn" onclick="copyIP()">Copy IP</button>
</div>
<div class="box">
BEDROCK PORT<br>
<b>25575</b><br>
<button class="copyBtn" onclick="copyPort()">Copy Port</button>
</div>
</div>

<div class="status">
Server Status: <span id="statusText">Checking...</span>
</div>

<div class="cross">
⚡ CROSSPLAY JAVA + BEDROCK + PE ⚡
</div>

<a class="discord" href="https://discord.gg/Zc6PkAXTgF" target="_blank">Join Discord</a>
</section>

<!-- ===== STAFF, CREATORS, PARTNERS, DISCORD COMMUNITY ===== -->
<!-- (Use previous sections from the last all-in-one code, sizes updated as above) -->

<!-- ===== TOAST ===== -->
<div id="toast"></div>

<script>
// ===== TOAST & SERVER STATUS SCRIPT =====
function showToast(message){
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");
  setTimeout(()=> toast.classList.remove("show"),1500);
}
function copyIP(){navigator.clipboard.writeText("play.gamerlog.fun"); showToast("IP Copied!");}
function copyPort(){navigator.clipboard.writeText("25575"); showToast("Port Copied!");}

async function checkServer(){
  try{
    let res=await fetch("https://api.mcsrvstat.us/2/play.gamerlog.fun");
    let data=await res.json();
    let status=document.getElementById("statusText");
    if(data.online){status.innerHTML="<span class='online'>ONLINE</span> | Players: "+data.players.online;}
    else{status.innerHTML="<span class='offline'>OFFLINE</span>";}
  }catch{document.getElementById("statusText").innerText="Status Error";}
}
checkServer(); setInterval(checkServer,30000);

const scrollElements = document.querySelectorAll('.scroll-element');
const elementInView = (el, offset = 0) => el.getBoundingClientRect().top <= (window.innerHeight || document.documentElement.clientHeight) - offset;
const displayScrollElement = el => el.classList.add('visible');
const hideScrollElement = el => el.classList.remove('visible');
const handleScrollAnimation = () => {scrollElements.forEach(el=>elementInView(el,100)?displayScrollElement(el):hideScrollElement(el));};
window.addEventListener('scroll', handleScrollAnimation);
handleScrollAnimation();
</script>

</body>
</html>
