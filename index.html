<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not_aadi Store</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0a0f0d;color:#fff;font-family:Inter;overflow-x:hidden}

/* 🔥 Loader */
#loader{
position:fixed;
width:100%;
height:100%;
background:#0a0f0d;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-family:'Press Start 2P';
}

/* 🌌 Particles */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* Hero */
.hero{
text-align:center;
padding:120px 20px;
}

h1{
font-family:'Press Start 2P';
font-size:32px;
margin-bottom:20px;
}

p{
color:#aaa;
}

.btn{
padding:12px 20px;
background:#2ecc71;
border:none;
color:black;
cursor:pointer;
margin-top:15px;
}

/* Cards */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
transition:transform .3s;
}

/* 🎮 3D Hover */
.card:hover{
transform:rotateX(10deg) rotateY(10deg) scale(1.05);
}

/* ✨ Scroll Animation */
.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<!-- 🔥 Loader -->
<div id="loader">Loading...</div>

<!-- 🌌 Background -->
<canvas id="bg"></canvas>

<!-- 🎮 Hero -->
<section class="hero fade">
<h1>Not_aadi Store</h1>
<p>Pro Minecraft Server Setups</p>
<button class="btn">Shop Now</button>
</section>

<!-- 🛒 Products -->
<section class="cards">
<div class="card fade">Survival Setup ₹699</div>
<div class="card fade">Bedwars Setup ₹599</div>
<div class="card fade">PvP Setup ₹1299</div>
<div class="card fade">Full Setup ₹2999</div>
</section>

<script>

// 🔥 Loader Fix
window.onload = () => {
  document.getElementById('loader').style.display = 'none';
};

// ✨ Scroll Animation
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      el.classList.add('show');
    }
  });
});

// 🌌 Particles Background
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    speed: Math.random() * 1
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.y += p.speed;
    if (p.y > canvas.height) p.y = 0;

    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(p.x, p.y, 2, 2);
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
