<mtml>
<head>
  <title>Partners | Gamerlog SMP</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #0a0a0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 40px;
      color: #FF0055;
      text-shadow: 2px 2px #8B00FF88;
    }

    .partner-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      background: #1a1a2e;
      border-radius: 15px;
      padding: 25px;
      width: 90%;
      max-width: 900px;
      margin-bottom: 30px;
      box-shadow: 0 5px 20px rgba(255,0,85,0.3);
      transition: transform 0.3s ease;
    }

    .partner-card:hover {
      transform: translateY(-5px);
    }

    .partner-card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-right: 30px;
      background: #FF0055;
      color: white;
      font-size: 4em;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      line-height: 120px;
      border: 2px solid #FF66AA;
    }

    .partner-info h2 {
      margin: 0;
      color: #FF66AA;
      font-size: 1.8em;
    }

    .partner-info p {
      margin: 8px 0 15px;
      font-size: 1em;
      color: #cccccc;
    }

    .partner-info a {
      padding: 10px 25px;
      font-size: 1em;
      color: white;
      background: #8B00FF;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .partner-info a:hover {
      background: #FF0055;
    }

    .partner-note {
      margin-top: 15px;
      font-size: 0.95em;
      color: #bbbbbb;
    }

  </style>
</head>

<body>
  <h1>🤝 Our Partners</h1>

  <!-- Mystery Partner -->
  <div class="partner-card">
    <div style="width:120px; height:120px; border-radius:50%; background:#FF0055; color:white; font-size:4em; display:flex; justify-content:center; align-items:center; margin-right:30px; border: 2px solid #FF66AA;">
      ?
    </div>
    <div class="partner-info">
      <h2>Mystery Partner</h2>
      <p>Click below to join our Discord and apply to become a partner!</p>
      <a href="https://discord.gg/Zc6PkAXTgF" target="_blank">Join Discord</a>
      <div class="partner-note">
        To be a partner, join our Discord and make a ticket.
      </div>
    </div>
  </div>

</body>
</mtml>
