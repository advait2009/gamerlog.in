<style>
/* ===== YOUR ORIGINAL CODE (UNCHANGED) ===== */
html{scroll-behavior:smooth;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body{
  background:radial-gradient(circle at top,#1b0033,#000);
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 60px;
  background:#000;
}
.logoText{font-size:24px;font-weight:bold;}
nav ul{
  display:flex;
  gap:30px;
  list-style:none;
}
nav ul li a{
  color:#aaa;
  text-decoration:none;
  font-weight:600;
}
nav ul li a:hover{color:#00eaff;}
.login{
  background:linear-gradient(90deg,#5f6fff,#a259ff);
  padding:8px 20px;
  border-radius:8px;
  font-weight:bold;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
}
.logoBox img{
  width:420px;
  animation:float 4s infinite ease-in-out;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}
.season{margin-top:30px;color:#ffd000;font-size:50px;letter-spacing:6px;}
.coming{font-size:70px;color:#6ff9ff;font-weight:bold;margin-top:10px;}

/* SERVER BOX */
.serverBox{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  margin-top:50px;
}
.box{
  background:#0a0f18;
  padding:35px 45px;
  border-radius:14px;
  border:1px solid #142235;
  font-size:22px;
  position:relative;
}
.box b{font-size:28px;}
.copyBtn{
  margin-top:15px;
  padding:10px 22px;
  border:none;
  border-radius:8px;
  background:#00eaff;
  color:black;
  cursor:pointer;
  font-weight:bold;
}
.copyMsg{
  display:inline-block;
  opacity:0;
  margin-left:10px;
  color:#00eaff;
  font-weight:bold;
  position:absolute;
  top:5px;
  right:10px;
  transition: opacity 0.5s ease, transform 0.5s ease;
  transform: translateY(-10px);
}
.copyMsg.show{
  opacity:1;
  transform: translateY(-25px);
}

/* STATUS */
.status{margin-top:30px;font-size:22px;}
.online{color:#00ff9d;font-weight:bold;}
.offline{color:red;font-weight:bold;}

/* CROSSPLAY */
.cross{
  border:2px solid #ffd000;
  padding:12px 30px;
  border-radius:25px;
  margin-top:30px;
  font-weight:bold;
  font-size:20px;
}

/* DISCORD BUTTON */
.discord{
  margin-top:35px;
  display:inline-block;
  background:#5865F2;
  padding:14px 32px;
  border-radius:10px;
  font-weight:bold;
  text-decoration:none;
  color:white;
  font-size:18px;
}

/* STAFF */
.staffSection{
  padding:120px 20px;
  background:#000;
  text-align:center;
}
.staffTitle{
  font-size:50px;
  color:#6dd5ff;
  margin-bottom:60px;
}
.staff{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
}
.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:220px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #00eaff;
}
.card img{
  width:120px;
  border-radius:10px;
}
.name{font-size:20px;margin-top:10px;}
.owner{color:gold;}
.head{color:#ff5c5c;}
.dev{color:#4cc9f0;}
.media{color:#ff9f43;}

/* CREATORS */
.creatorSection{
  padding:120px 20px;
  background:radial-gradient(circle,#3a0f0f,#070707);
  text-align:center;
}
.creatorTitle{
  font-size:45px;
  letter-spacing:4px;
  color:#ff4d4d;
  text-shadow:0 0 20px #ff4d4d;
  margin-bottom:60px;
}
.creatorContainer{
  display:flex;
  justify-content:center;
  gap:60px;
  flex-wrap:wrap;
}

/* PARTNERS */
.partnerSection{
  padding:100px 20px;
  text-align:center;
  background:#0a0a0f;
}
</style>
</head>
