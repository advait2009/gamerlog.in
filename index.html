<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamerlog SMP</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle,#140021,#000000);
color:white;
text-align:center;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#000;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav ul li{
color:#ccc;
cursor:pointer;
font-weight:bold;
}

nav ul li:hover{
color:#00eaff;
}

.login{
background:linear-gradient(90deg,#6a6cff,#9c5bff);
padding:8px 18px;
border-radius:8px;
}

/* LOGO */

.hero{
margin-top:80px;
}

.logo{
width:420px;
max-width:90%;
}

/* SEASON */

.season{
margin-top:40px;
font-size:34px;
color:#ffd900;
letter-spacing:5px;
font-weight:bold;
}

.timer{
font-size:60px;
color:#7ef9ff;
margin-top:10px;
font-weight:bold;
}

/* SERVER INFO */

.serverBox{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.box{
background:#06141a;
padding:18px 30px;
border-radius:10px;
border:1px solid #0f2a35;
}

.copy{
margin-left:10px;
cursor:pointer;
}

/* CROSS PLAY */

.cross{
margin-top:25px;
border:2px solid #ffc400;
display:inline-block;
padding:10px 25px;
border-radius:20px;
color:#ffc400;
font-weight:bold;
}

</style>
</head>

<body>

<nav>

<div style="font-weight:bold">GAMERLOG SMP</div>

<ul>
<li style="color:#00eaff">HOME</li>
<li>STAFF</li>
<li>CREATORS</li>
<li>PARTNER</li>
<li>UPDATES</li>
<li>SUPPORT</li>
</ul>

<div class="login">LOGIN</div>

</nav>

<div class="hero">

<img src="gamerlog-logo.png" class="logo">

<div class="season">SEASON 3</div>

<div class="timer" id="timer">30:00:00</div>

<div class="serverBox">

<div class="box">
JAVA EDITION<br>
<b id="ip">play.gamerlog.fun</b>
<span class="copy" onclick="copyIP()">📋</span>
</div>

<div class="box">
BEDROCK PORT<br>
<b>25575</b>
</div>

</div>

<div class="cross">
⚡ CROSS CONNECTION | JAVA + PE ⚡
</div>

</div>

<script>

/* COPY IP */

function copyIP(){
navigator.clipboard.writeText("play.gamerlog.fun");
alert("IP Copied!");
}

/* COUNTDOWN */

let time = 104000;

function updateTimer(){

let h = Math.floor(time/3600);
let m = Math.floor((time%3600)/60);
let s = time%60;

document.getElementById("timer").innerText =
h + ":" + m + ":" + s;

time--;
}

setInterval(updateTimer,1000);

</script>

</body>
</html>
