<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamerlog SMP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
background:radial-gradient(circle at top,#1b0033,#000);
color:white;
overflow-x:hidden;
animation:fadeIn 1s ease;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes glow{
0%{box-shadow:0 0 10px #a200ff}
50%{box-shadow:0 0 40px #a200ff}
100%{box-shadow:0 0 10px #a200ff}
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:#000;
border-bottom:1px solid #111;
}

.logoText{
font-size:20px;
font-weight:bold;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav ul li{
cursor:pointer;
color:#aaa;
font-weight:600;
transition:0.3s;
}

nav ul li:hover{
color:#00eaff;
}

.login{
background:linear-gradient(90deg,#5f6fff,#a259ff);
padding:8px 20px;
border-radius:8px;
font-weight:bold;
}

/* HERO */

.hero{
text-align:center;
padding:100px 20px;
}

/* LOGO */

.logoBox{
display:inline-block;
padding:20px;
border-radius:10px;
animation:glow 3s infinite;
}

.logoBox img{
width:420px;
max-width:90%;
animation:float 4s ease-in-out infinite;
}

/* TEXT */

.season{
margin-top:30px;
color:#ffd000;
font-size:36px;
letter-spacing:5px;
}

.coming{
font-size:50px;
color:#6ff9ff;
font-weight:bold;
margin-top:10px;
}

/* SERVER BOX */

.serverBox{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:40px;
}

.box{
background:#0a0f18;
padding:22px 30px;
border-radius:12px;
border:1px solid #142235;
transition:0.3s;
}

.box:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #00eaff;
}

.copyBtn{
margin-top:12px;
padding:8px 18px;
border:none;
border-radius:6px;
background:#00eaff;
color:black;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.copyBtn:hover{
transform:scale(1.1);
}

.copied{
background:#00ff9d !important;
box-shadow:0 0 15px #00ff9d;
}

/* CROSS */

.cross{
border:2px solid #ffd000;
padding:10px 24px;
border-radius:20px;
display:inline-block;
color:#ffd000;
margin-top:25px;
font-weight:bold;
}

/* DISCORD */

.discord{
margin-top:30px;
display:inline-block;
background:#5865F2;
padding:12px 26px;
border-radius:8px;
font-weight:bold;
text-decoration:none;
color:white;
transition:0.3s;
}

.discord:hover{
transform:scale(1.1);
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#000;
border-top:1px solid #111;
margin-top:60px;
}

</style>
</head>

<body>

<nav>

<div class="logoText">GAMERLOG SMP</div>

<ul>
<li>HOME</li>
<li>STAFF</li>
<li>CREATORS</li>
<li>PARTNER</li>
<li>SUPPORT</li>
</ul>

<div class="login">LOGIN</div>

</nav>

<section class="hero">

<div class="logoBox">
<img src="gamerlog-logo.png">
</div>

<div class="season">SEASON 3</div>
<div class="coming">COMING SOON</div>

<div class="serverBox">

<div class="box">
JAVA EDITION<br>
<b>play.gamerlog.fun</b><br>
<button class="copyBtn" onclick="copyJava(this)">Copy IP</button>
</div>

<div class="box">
BEDROCK PORT<br>
<b>25575</b><br>
<button class="copyBtn" onclick="copyPort(this)">Copy Port</button>
</div>

</div>

<div class="cross">
⚡ CROSSPLAY JAVA + BEDROCK + PE ⚡
</div>

<br>

<a class="discord" href="https://discord.gg/Zc6PkAXTgF" target="_blank">
Join Discord
</a>

</section>

<footer>
© 2026 Gamerlog SMP • All Rights Reserved
</footer>

<script>

function copyJava(btn){

navigator.clipboard.writeText("play.gamerlog.fun");

btn.innerText="Copied!";
btn.classList.add("copied");

setTimeout(()=>{
btn.innerText="Copy IP";
btn.classList.remove("copied");
},2000);

}

function copyPort(btn){

navigator.clipboard.writeText("25575");

btn.innerText="Copied!";
btn.classList.add("copied");

setTimeout(()=>{
btn.innerText="Copy Port";
btn.classList.remove("copied");
},2000);

}

</script>

</body>
</html>
