<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamerlog SMP</title>

<style>

html{scroll-behavior:smooth;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}

body{
background: radial-gradient(circle at top,#1b0033,#000);
color:white;
overflow-x:hidden;
}

/* PARTICLE BACKGROUND */

.particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:70px 70px;
animation:particlesMove 80s linear infinite;
opacity:0.08;
z-index:-1;
}

@keyframes particlesMove{
0%{background-position:0 0, 30px 30px;}
100%{background-position:1000px 1000px, 1030px 1030px;}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#000;
position:sticky;
top:0;
z-index:10;
}

.logoText{
font-size:24px;
font-weight:bold;
color:#00eaff;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
color:#aaa;
text-decoration:none;
font-weight:600;
}

nav a:hover{
color:#00eaff;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.logoBox img{
width:420px;
animation:logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.season{
margin-top:30px;
font-size:55px;
letter-spacing:5px;
color:#ffd000;
}

.coming{
font-size:70px;
color:#6ff9ff;
font-weight:bold;
margin-top:10px;
}

/* SERVER BOX */

.serverBox{
display:flex;
gap:30px;
margin-top:50px;
flex-wrap:wrap;
justify-content:center;
}

.box{
background:rgba(10,15,24,0.8);
backdrop-filter:blur(10px);
padding:35px 45px;
border-radius:16px;
border:1px solid #1e3a5f;
font-size:22px;
text-align:center;
transition:0.3s;
}

.box:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #00eaff;
}

.box b{font-size:28px;}

.copyBtn{
margin-top:15px;
padding:10px 22px;
border:none;
border-radius:8px;
background:#00eaff;
color:black;
cursor:pointer;
font-weight:bold;
transition:0.25s;
}

.copyBtn:hover{
transform:scale(1.1);
}

/* COPY MESSAGE */

.copyMsg{
margin-top:10px;
font-size:14px;
color:#00ff9d;
display:none;
}

/* STATUS */

.status{
margin-top:30px;
font-size:22px;
}

.online{
color:#00ff9d;
font-weight:bold;
}

.offline{
color:red;
font-weight:bold;
}

/* CROSSPLAY */

.cross{
border:2px solid #ffd000;
padding:12px 30px;
border-radius:30px;
margin-top:30px;
font-weight:bold;
font-size:20px;
}

/* DISCORD */

.discord{
margin-top:35px;
display:inline-block;
background:#5865F2;
padding:14px 34px;
border-radius:10px;
font-weight:bold;
text-decoration:none;
color:white;
font-size:18px;
transition:0.3s;
}

.discord:hover{
transform:scale(1.1);
box-shadow:0 0 20px #5865F2;
}

/* STAFF */

.staffSection{
padding:120px 20px;
background:#000;
text-align:center;
}

.staffTitle{
font-size:50px;
color:#6dd5ff;
margin-bottom:60px;
}

.staff{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
width:220px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #00eaff;
}

.card img{
width:120px;
border-radius:10px;
}

.name{
font-size:20px;
margin-top:10px;
}

.owner{color:gold;}
.head{color:#ff5c5c;}
.dev{color:#4cc9f0;}
.media{color:#ff9f43;}

/* CREATORS */

.creatorSection{
padding:120px 20px;
background:radial-gradient(circle,#3a0f0f,#070707);
text-align:center;
}

.creatorTitle{
font-size:45px;
letter-spacing:4px;
color:#ff4d4d;
text-shadow:0 0 20px #ff4d4d;
margin-bottom:60px;
}

.creatorContainer{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.creatorCard{
width:350px;
padding:35px;
border-radius:20px;
background:#141414;
box-shadow:0 0 30px rgba(255,60,60,0.6);
animation:creatorFloat 4s infinite ease-in-out;
}

@keyframes creatorFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.avatar{
width:80px;
height:80px;
background:#ff6a6a;
margin:auto;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
}

.creatorName{
margin-top:15px;
font-size:28px;
font-weight:bold;
}

.creatorTag{
margin:15px auto;
padding:6px 16px;
border:1px solid #ff5a5a;
border-radius:20px;
display:inline-block;
font-size:13px;
color:#ff7b7b;
}

.creatorDesc{
margin-top:10px;
margin-bottom:25px;
font-size:14px;
color:#ddd;
line-height:1.6;
}

.creatorBtn a{
text-decoration:none;
background:linear-gradient(90deg,#ff0000,#ff3c3c);
padding:12px 28px;
border-radius:10px;
color:white;
font-weight:bold;
transition:0.3s;
}

.creatorBtn a:hover{
transform:scale(1.1);
box-shadow:0 0 20px red;
}

</style>
</head>

<body>

<div class="particles"></div>

<nav>
<div class="logoText">GAMERLOG SMP</div>

<ul>
<li><a href="#">HOME</a></li>
<li><a href="#staff">STAFF</a></li>
<li><a href="#creators">CREATORS</a></li>
</ul>
</nav>

<section class="hero">

<div class="logoBox">
<img src="gamerlog-logo.png">
</div>

<div class="season">SEASON 3</div>
<div class="coming">COMING SOON</div>

<div class="serverBox">

<div class="box">
JAVA IP<br>
<b>play.gamerlog.fun</b><br>
<button class="copyBtn" onclick="copyIP()">Copy IP</button>
<div class="copyMsg" id="ipMsg">Copied!</div>
</div>

<div class="box">
BEDROCK PORT<br>
<b>25575</b><br>
<button class="copyBtn" onclick="copyPort()">Copy Port</button>
<div class="copyMsg" id="portMsg">Copied!</div>
</div>

</div>

<div class="status">
Server Status: <span id="statusText">Checking...</span>
</div>

<div class="cross">
⚡ CROSSPLAY JAVA + BEDROCK + PE ⚡
</div>

<a class="discord" href="https://discord.gg/Zc6PkAXTgF" target="_blank">
Join Discord
</a>

</section>

<script>

function copyIP(){
navigator.clipboard.writeText("play.gamerlog.fun");
document.getElementById("ipMsg").style.display="block";
setTimeout(()=>{ipMsg.style.display="none"},2000);
}

function copyPort(){
navigator.clipboard.writeText("25575");
document.getElementById("portMsg").style.display="block";
setTimeout(()=>{portMsg.style.display="none"},2000);
}

async function checkServer(){
try{
let res=await fetch("https://api.mcsrvstat.us/2/play.gamerlog.fun");
let data=await res.json();
let status=document.getElementById("statusText");

if(data.online){
status.innerHTML="<span class='online'>ONLINE</span> | Players: "+data.players.online;
}else{
status.innerHTML="<span class='offline'>OFFLINE</span>";
}

}catch{
document.getElementById("statusText").innerText="Status Error";
}
}

checkServer();
setInterval(checkServer,30000);

</script>

</body>
</html>
