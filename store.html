<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
}

/* 🔥 DISCORD BANNER */
.discord-banner {
  background: linear-gradient(90deg, #5865F2, #404eed);
  padding: 15px;
  text-align: center;
  font-weight: bold;
  animation: glowBanner 2s infinite alternate;
}

@keyframes glowBanner {
  from { box-shadow: 0 0 10px #5865F2; }
  to { box-shadow: 0 0 25px #7289da; }
}

.discord-btn {
  margin-left: 10px;
  padding: 8px 15px;
  border-radius: 8px;
  border: none;
  background: white;
  color: #5865F2;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.discord-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 10px white;
}

/* STORE */
#store {
  padding: 60px;
  text-align: center;
}

h1 {
  font-size: 48px;
  background: linear-gradient(90deg, orange, gold);
  -webkit-background-clip: text;
  color: transparent;
}

.subtitle {
  color: #aaa;
  font-size: 18px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  margin-top: 50px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  transition: 0.4s;
  border: 1px solid rgba(255,165,0,0.2);
  position: relative;
  overflow: hidden;

  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 0.8s ease forwards;
}

/* stagger */
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }
.card:nth-child(5) { animation-delay: 0.5s; }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* glow border */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  padding: 2px;
  background: linear-gradient(45deg, orange, gold, orange);
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 40px rgba(255,165,0,0.6);
}

/* IMAGE */
.rank-img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 15px;
  transition: 0.3s;
}

.card:hover .rank-img {
  transform: scale(1.05);
}

/* TEXT */
.rank-title {
  font-size: 22px;
  color: orange;
}

.price {
  display: block;
  margin: 10px 0;
  font-size: 20px;
  color: gold;
}

/* BUTTON */
button {
  background: linear-gradient(45deg, orange, gold);
  border: none;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  color: black;
  font-weight: bold;
  width: 100%;
  transition: 0.3s;
}

button:hover {
  box-shadow: 0 0 20px gold;
  transform: scale(1.05);
}

button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<!-- 🔥 DISCORD BANNER -->
<div class="discord-banner">
  💬 Want to buy a rank? Join our Discord!
  <button class="discord-btn" onclick="goDiscord()">Join Now</button>
</div>

<section id="store">

<h1>🔥 Classic Ranks</h1>
<p class="subtitle">Upgrade your power with premium ranks</p>

<div class="grid">

<div class="card">
  <img src="god.png" class="rank-img">
  <h2 class="rank-title">deadliest</h2>
  <p>+5000 Coins</p>
  <span class="price">₹599</span>
  <button onclick="goDiscord()">💬 Buy via Discord</button>
</div>

<div class="card">
  <img src="Supreme.png" class="rank-img">
  <h2 class="rank-title">god</h2>
  <p>+3200 Coins</p>
  <span class="price">₹299</span>
  <button onclick="goDiscord()">💬 Buy via Discord</button>
</div>

<div class="card">
  <img src="legend.png" class="rank-img">
  <h2 class="rank-title">epic</h2>
  <p>+2000 Coins</p>
  <span class="price">₹129</span>
  <button onclick="goDiscord()">💬 Buy via Discord</button>
</div>

<div class="card">
  <img src="mastermind.png" class="rank-img">
  <h2 class="rank-title">prime</h2>
  <p>+1000 Coins</p>
  <span class="price">₹59</span>
  <button onclick="goDiscord()">💬 Buy via Discord</button>
</div>

<div class="card">
  <img src="alpha.png" class="rank-img">
  <h2 class="rank-title">member</h2>
  <p>+850 Coins</p>
  <span class="price">free</span>
  <button onclick="goDiscord()">💬 Buy via Discord</button>
</div>

</div>
</section>

<script>
function goDiscord() {
  window.open("https://discord.gg/g6vYUuujXv", "_blank");
}
</script>

</body>
</html>
