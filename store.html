<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
  overflow-x: hidden;
}

/* STORE */
#store {
  padding: 60px;
  text-align: center;
}

h1 {
  font-size: 48px;
  background: linear-gradient(90deg, orange, gold);
  -webkit-background-clip: text;
  color: transparent;
}

.subtitle {
  color: #aaa;
  font-size: 18px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
  margin-top: 50px;
}

/* FLOAT animation */
@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  cursor: pointer;

  animation: fadeUp 0.8s ease forwards, float 4s ease-in-out infinite;
  opacity: 0;
}

/* stagger */
.card:nth-child(1){ animation-delay: 0.1s, 0s; }
.card:nth-child(2){ animation-delay: 0.2s, 0.2s; }
.card:nth-child(3){ animation-delay: 0.3s, 0.4s; }
.card:nth-child(4){ animation-delay: 0.4s, 0.6s; }
.card:nth-child(5){ animation-delay: 0.5s, 0.8s; }

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* animated rainbow glow border */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 2px;
  border-radius: 20px;
  background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet, red);
  background-size: 300%;
  animation: borderMove 6s linear infinite;
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
}

/* border animation */
@keyframes borderMove {
  0% {background-position: 0%}
  100% {background-position: 300%}
}

/* shine effect */
.card::after {
  content: "";
  position: absolute;
  top: -100%;
  left: -100%;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: rotate(25deg);
  transition: 0.5s;
}

.card:hover::after {
  top: 100%;
  left: 100%;
}

/* hover */
.card:hover {
  transform: scale(1.08) rotate(1deg);
  box-shadow: 0 0 50px gold;
}

/* IMAGE */
.rank-img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 15px;
  transition: 0.4s;
}

.card:hover .rank-img {
  transform: scale(1.1) rotate(2deg);
}

/* TEXT */
.rank-title {
  font-size: 22px;
  color: orange;
}

.price {
  display: block;
  margin: 10px 0;
  font-size: 20px;
  color: gold;
}

/* BUTTON */
.buy-btn {
  background: linear-gradient(45deg, orange, gold);
  border: none;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  color: black;
  font-weight: bold;
  width: 100%;
  transition: 0.3s;
}

.buy-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px gold;
}

/* ripple click */
.buy-btn:active::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.3);
  border-radius: 12px;
  top: 0;
  left: 0;
  animation: ripple 0.4s ease;
}

@keyframes ripple {
  from {opacity:1;}
  to {opacity:0;}
}
</style>
</head>

<body>

<section id="store">
<h1>🔥 Classic Ranks</h1>
<p class="subtitle">Click anywhere to buy via Discord</p>

<div class="grid">

<div class="card" onclick="goDiscord()">
  <img src="god.png" class="rank-img">
  <h2 class="rank-title">deadliest</h2>
  <p>+5000 Coins</p>
  <span class="price">₹599</span>
  <button class="buy-btn" onclick="goDiscord(event)">🛒 Buy Now</button>
</div>

<div class="card" onclick="goDiscord()">
  <img src="Supreme.png" class="rank-img">
  <h2 class="rank-title">god</h2>
  <p>+3200 Coins</p>
  <span class="price">₹299</span>
  <button class="buy-btn" onclick="goDiscord(event)">🛒 Buy Now</button>
</div>

<div class="card" onclick="goDiscord()">
  <img src="legend.png" class="rank-img">
  <h2 class="rank-title">epic</h2>
  <p>+2000 Coins</p>
  <span class="price">₹129</span>
  <button class="buy-btn" onclick="goDiscord(event)">🛒 Buy Now</button>
</div>

<div class="card" onclick="goDiscord()">
  <img src="mastermind.png" class="rank-img">
  <h2 class="rank-title">prime</h2>
  <p>+1000 Coins</p>
  <span class="price">₹59</span>
  <button class="buy-btn" onclick="goDiscord(event)">🛒 Buy Now</button>
</div>

<div class="card" onclick="goDiscord()">
  <img src="alpha.png" class="rank-img">
  <h2 class="rank-title">member</h2>
  <p>+850 Coins</p>
  <span class="price">free</span>
  <button class="buy-btn" onclick="goDiscord(event)">🛒 Buy Now</button>
</div>

</div>
</section>

<script>
function goDiscord(e) {
  if (e) e.stopPropagation();
  window.open("https://discord.gg/g6vYUuujXv", "_blank");
}
</script>

</body>
</html>
