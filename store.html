<section id="store" style="padding:60px; text-align:center; background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);">

<h1 style="font-size:48px; background: linear-gradient(90deg, orange, gold); -webkit-background-clip: text; color: transparent;">
🔥 Classic Ranks
</h1>
<p style="color:#aaa; font-size:18px;">Upgrade your power with premium ranks</p>

<div style="
display:grid;
grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
gap:30px;
margin-top:50px;
">

<!-- CARD -->
<div class="card">
  <img src="god.png" class="rank-img">
  <h2 class="rank-title">deadliest</h2>
  <p>+5000 Coins</p>
  <span class="price">$25.00</span>
  <button onclick="buyRank('God')">Buy Now</button>
</div>

<div class="card">
  <img src="Supreme.png" class="rank-img">
  <h2 class="rank-title">god</h2>
  <p>+3200 Coins</p>
  <span class="price">$2.00</span>
  <button onclick="buyRank('Supreme')">Buy Now</button>
</div>

<div class="card">
  <img src="legend.png" class="rank-img">
  <h2 class="rank-title">epic</h2>
  <p>+2000 Coins</p>
  <span class="price">$11.00</span>
  <button onclick="buyRank('Legend')">Buy Now</button>
</div>

<div class="card">
  <img src="mastermind.png" class="rank-img">
  <h2 class="rank-title">prime</h2>
  <p>+1000 Coins</p>
  <span class="price">$6.70</span>
  <button onclick="buyRank('Mastermind')">Buy Now</button>
</div>

<div class="card">
  <img src="alpha.png" class="rank-img">
  <h2 class="rank-title">member</h2>
  <p>+850 Coins</p>
  <span class="price">free</span>
  <button onclick="buyRank('Alpha')">Buy Now</button>
</div>

</div>
</section>

<style>
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  transition: 0.4s;
  border: 1px solid rgba(255,165,0,0.2);
  position: relative;
  overflow: hidden;
}

/* glowing border effect */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  padding: 2px;
  background: linear-gradient(45deg, orange, gold, orange);
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 40px rgba(255,165,0,0.6);
}

.rank-img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 15px;
}

.rank-title {
  font-size: 22px;
  color: orange;
  letter-spacing: 1px;
}

.price {
  display: block;
  margin: 10px 0;
  font-size: 20px;
  color: gold;
}

/* insane glowing button */
button {
  background: linear-gradient(45deg, orange, gold);
  border: none;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  color: black;
  font-weight: bold;
  width: 100%;
  transition: 0.3s;
}

button:hover {
  box-shadow: 0 0 20px gold;
  transform: scale(1.05);
}
</style>

<script>
function buyRank(rank) {
  alert("🔥 You selected: " + rank);
}
</script>
